<!DOCTYPE html>
<html>
<head>
<style>
  :root {
      --blur: 20px;
  }
  .box1 {
      width: 100px; height: 100px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(var(--blur));
  }
  .box2 {
      width: 100px; height: 100px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(calc(var(--blur) * 0.5));
  }
</style>
</head>
<body>
  <div class="box1">Box 1</div>
  <div class="box2">Box 2</div>
</body>
</html>
