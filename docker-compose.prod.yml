services:
  postgres:
    image: postgres:17-alpine
    container_name: fish-website-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fish}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fish123456}
      POSTGRES_DB: ${POSTGRES_DB:-fish_website}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fish} -d ${POSTGRES_DB:-fish_website}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - fish-network

  minio:
    image: minio/minio:RELEASE.2025-03-12T18-04-18Z
    container_name: fish-website-minio
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-fishminio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-fishminio123456}
    volumes:
      - minio-data:/data
    networks:
      - fish-network

  backend:
    image: ghcr.io/${GHCR_OWNER:-your-github-username-or-org}/fish-website-backend:${IMAGE_TAG:-latest}
    container_name: fish-website-backend
    pull_policy: always
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - fish-network

  frontend:
    image: ghcr.io/${GHCR_OWNER:-your-github-username-or-org}/fish-website-frontend:${IMAGE_TAG:-latest}
    container_name: fish-website-frontend
    pull_policy: always
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    networks:
      - fish-network

volumes:
  postgres-data:
  minio-data:

networks:
  fish-network:
    driver: bridge
