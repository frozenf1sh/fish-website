syntax = "proto3";

package home.v1;

option go_package = "github.com/frozenfish/fish-website/gen/go/home/v1;homev1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

// AuthService handles user authentication
service AuthService {
  // Login authenticates a user with password and returns a token
  rpc Login(LoginRequest) returns (LoginResponse);
}

// PostService handles twitter-style timeline posts
service PostService {
  // CreatePost creates a new post with optional images
  rpc CreatePost(CreatePostRequest) returns (CreatePostResponse);
  // ListPosts returns paginated timeline posts
  rpc ListPosts(ListPostsRequest) returns (ListPostsResponse);
  // DeletePost deletes a post by ID
  rpc DeletePost(DeletePostRequest) returns (google.protobuf.Empty);
}

// BlogService handles blog articles with folder organization
service BlogService {
  // CreateArticle creates a new blog article
  rpc CreateArticle(CreateArticleRequest) returns (CreateArticleResponse);
  // ListArticles returns articles with folder filter support
  rpc ListArticles(ListArticlesRequest) returns (ListArticlesResponse);
  // GetArticle returns a single article by ID
  rpc GetArticle(GetArticleRequest) returns (GetArticleResponse);
}

// AlbumService handles photo albums and image uploads
service AlbumService {
  // CreateAlbum creates a new photo album
  rpc CreateAlbum(CreateAlbumRequest) returns (CreateAlbumResponse);
  // UploadImageRequest gets a presigned URL for uploading an image
  rpc UploadImageRequest(UploadImageRequestRequest) returns (UploadImageRequestResponse);
  // ConfirmImageUpload notifies backend that image has been uploaded
  rpc ConfirmImageUpload(ConfirmImageUploadRequest) returns (ConfirmImageUploadResponse);
}

// SettingsService handles user settings and preferences
service SettingsService {
  // GetSettings retrieves current user settings
  rpc GetSettings(google.protobuf.Empty) returns (GetSettingsResponse);
  // UpdateSettings updates user settings
  rpc UpdateSettings(UpdateSettingsRequest) returns (UpdateSettingsResponse);
}

// Auth messages
message LoginRequest {
  string username = 1;
  string password = 2;
}

message LoginResponse {
  string token = 1;
  google.protobuf.Timestamp expires_at = 2;
}

// Post messages
message Post {
  string id = 1;
  string content = 2;
  repeated string image_urls = 3;
  google.protobuf.Timestamp created_at = 4;
}

message CreatePostRequest {
  string content = 1;
  repeated string image_ids = 2;
}

message CreatePostResponse {
  Post post = 1;
}

message ListPostsRequest {
  int32 page_size = 1;
  string page_token = 2;
}

message ListPostsResponse {
  repeated Post posts = 1;
  string next_page_token = 2;
  bool has_more = 3;
}

message DeletePostRequest {
  string id = 1;
}

// Blog messages
message Folder {
  string id = 1;
  string name = 2;
  string parent_folder_id = 3;
  repeated Folder children = 4;
}

message Article {
  string id = 1;
  string title = 2;
  string content = 3;
  string folder_id = 4;
  repeated string tags = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message CreateArticleRequest {
  string title = 1;
  string content = 2;
  string folder_id = 3;
  repeated string tags = 4;
}

message CreateArticleResponse {
  Article article = 1;
}

message ListArticlesRequest {
  int32 page_size = 1;
  string page_token = 2;
  string folder_id = 3;
  string tag = 4;
}

message ListArticlesResponse {
  repeated Article articles = 1;
  string next_page_token = 2;
  bool has_more = 3;
  repeated Folder folders = 4;
}

message GetArticleRequest {
  string article_id = 1;
}

message GetArticleResponse {
  Article article = 1;
}

// Album messages
message Album {
  string id = 1;
  string name = 2;
  string description = 3;
  bool is_public = 4;
  google.protobuf.Timestamp created_at = 5;
}

message Image {
  string id = 1;
  string album_id = 2;
  string url = 3;
  string thumbnail_url = 4;
  string file_name = 5;
  int64 file_size = 6;
  string mime_type = 7;
  google.protobuf.Timestamp created_at = 8;
}

message CreateAlbumRequest {
  string name = 1;
  string description = 2;
  bool is_public = 3;
}

message CreateAlbumResponse {
  Album album = 1;
}

message UploadImageRequestRequest {
  string album_id = 1;
  string file_name = 2;
  string mime_type = 3;
  int64 file_size = 4;
}

message UploadImageRequestResponse {
  string upload_url = 1;
  string image_id = 2;
  map<string, string> headers = 3;
  google.protobuf.Timestamp expires_at = 4;
}

message ConfirmImageUploadRequest {
  string image_id = 1;
  string upload_url = 2;
}

message ConfirmImageUploadResponse {
  Image image = 1;
}

// Settings messages
message Settings {
  // Personal info
  string display_name = 1;
  string bio = 2;
  string avatar_url = 3;

  // Social links
  string twitter_url = 4;
  string github_url = 5;
  string bilibili_url = 6;
  string custom_links = 7; // JSON string for custom links

  // Visual settings
  string background_image_url = 8;
  bool sakura_particles_enabled = 9;
  string theme_color = 10;

  google.protobuf.Timestamp updated_at = 11;
}

message GetSettingsResponse {
  Settings settings = 1;
}

message UpdateSettingsRequest {
  Settings settings = 1;
  // Field mask for partial updates
  repeated string update_mask = 2;
}

message UpdateSettingsResponse {
  Settings settings = 1;
}
