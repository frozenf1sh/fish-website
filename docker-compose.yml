services:
  postgres:
    image: postgres:17-alpine
    container_name: fish-website-postgres
    environment:
      POSTGRES_USER: fish
      POSTGRES_PASSWORD: fish123456
      POSTGRES_DB: fish_website
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fish -d fish_website"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-03-12T18-04-18Z
    container_name: fish-website-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: fishminio
      MINIO_ROOT_PASSWORD: fishminio123456
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  minio-data:
