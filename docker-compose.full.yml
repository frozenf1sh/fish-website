services:
  postgres:
    image: postgres:17-alpine
    container_name: fish-website-postgres
    environment:
      POSTGRES_USER: fish
      POSTGRES_PASSWORD: fish123456
      POSTGRES_DB: fish_website
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fish -d fish_website"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-03-12T18-04-18Z
    container_name: fish-website-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: fishminio
      MINIO_ROOT_PASSWORD: fishminio123456
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fish-website-backend
    environment:
      POSTGRES_DSN: postgres://fish:fish123456@postgres:5432/fish_website?sslmode=disable
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: fishminio
      MINIO_SECRET_KEY: fishminio123456
      MINIO_USE_SSL: "false"
      MINIO_BUCKET_NAME: fish-website
      ADMIN_PASSWORD: "your-secure-admin-password-change-me"
      JWT_SECRET: "your-super-secret-jwt-key-change-in-production"
      SERVER_ADDRESS: ":8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fish-website-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres-data:
  minio-data:
